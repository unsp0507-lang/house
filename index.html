<html lang="ko">

<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');
:root {
  --bg:#f4f6fb; --sur:#fff; --sur2:#f0f3f9;
  --bd:#e2e8f4; --bd2:#d0d9ee;
  --bl:#3b6ef6; --gr:#12b981; --rd:#ef4444; --am:#f59e0b; --pu:#8b5cf6;
  --bls:#eef2ff; --grs:#ecfdf5; --rds:#fef2f2; --ams:#fffbeb;
  --tx:#1e2a3a; --mu:#64748b; --mu2:#94a3b8;
  --sh:0 1px 4px rgba(60,80,140,.07),0 4px 16px rgba(60,80,140,.05);
  --shs:0 1px 3px rgba(60,80,140,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nanum Gothic',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;max-width:480px;margin:0 auto;font-size:14px}

/* 탭바 */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--sur);border-top:1px solid var(--bd);display:flex;z-index:999;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 12px rgba(60,80,140,.07)}
.tb{flex:1;padding:12px 0 10px;background:none;border:none;color:var(--mu2);font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .2s}
.tb.on{color:var(--bl)}
.tb svg{width:22px;height:22px}

/* 페이지 */
.pg{display:none;padding:0 0 90px}
.pg.on{display:block}

/* 헤더 */
.ph{padding:20px 16px 14px;background:var(--sur);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;box-shadow:var(--shs)}
.ph h1{font-size:18px;font-weight:800}
.ph p{font-size:12px;color:var(--mu);margin-top:3px}

/* 단지 선택 바 */
.cbar{background:var(--sur);border-bottom:1px solid var(--bd);position:sticky;top:59px;z-index:99;padding:10px 12px;display:flex;gap:8px;align-items:center}
.csel{flex:1;padding:10px 12px;border-radius:10px;border:1.5px solid var(--bd2);background:var(--sur2);color:var(--tx);font-family:inherit;font-size:14px;font-weight:700;outline:none;cursor:pointer}
.csel:focus{border-color:var(--bl)}
.cbtn{padding:9px 13px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.cbtn-add{background:var(--bl);color:#fff}
.cbtn-del{background:var(--rds);color:var(--rd);border:1.5px solid rgba(239,68,68,.25)!important}

/* 단지 추가 인라인 */
.cai{display:none;padding:10px 12px;background:var(--bls);border-bottom:1px solid var(--bd);gap:8px;align-items:center}
.cai.on{display:flex}
.cai input{flex:1;padding:9px 12px;border-radius:10px;border:1.5px solid var(--bd2);background:var(--sur);color:var(--tx);font-family:inherit;font-size:14px;outline:none}
.cai input:focus{border-color:var(--bl)}
.cai button{padding:9px 14px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.ok{background:var(--bl);color:#fff}
.cancel{background:var(--sur);color:var(--mu);border:1px solid var(--bd2)!important}

/* 삭제 확인 */
.delbar{display:none;background:var(--rds);border:1px solid rgba(239,68,68,.2);border-radius:12px;margin:10px 16px;padding:12px 14px;align-items:center;gap:10px}
.delbar.on{display:flex}
.delbar p{flex:1;font-size:13px;color:var(--rd);font-weight:700}
.delbar button{padding:7px 14px;border-radius:8px;border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.dy{background:var(--rd);color:#fff}
.dn{background:#fff;color:var(--mu);border:1px solid var(--bd2)!important;margin-right:4px}

/* 섹션 */
.slbl{font-size:11px;font-weight:700;color:var(--mu);letter-spacing:.5px;padding:16px 16px 8px;text-transform:uppercase}

/* 세입자 카드 */
.tc{margin:0 16px 10px;background:var(--sur);border:1.5px solid var(--bd);border-radius:16px;overflow:hidden;box-shadow:var(--sh)}
.tc.exit{border-color:rgba(239,68,68,.35)}
.tc.pending{border-color:rgba(245,158,11,.35)}
.sbar{height:4px}
.tc.exit .sbar{background:linear-gradient(90deg,var(--rd),#ff8a8a)}
.tc.stay .sbar{background:linear-gradient(90deg,var(--gr),#6ee7b7)}
.tc.pending .sbar{background:linear-gradient(90deg,var(--am),#fcd34d)}
.thead{padding:13px 14px 10px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.tico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tc.exit .tico{background:var(--rds)}
.tc.stay .tico{background:var(--grs)}
.tc.pending .tico{background:var(--ams)}
.tinf{flex:1}
.troom{font-size:13px;font-weight:800}
.tname{font-size:12px;color:var(--mu);margin-top:2px}
.tbadge{font-size:10px;font-weight:700;padding:4px 9px;border-radius:10px;flex-shrink:0}
.b-exit{background:var(--rds);color:var(--rd)}
.b-stay{background:var(--grs);color:var(--gr)}
.b-pending{background:var(--ams);color:var(--am)}
.b-exp{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}
.b-expd{background:#fce4ec;color:#c62828;border:1px solid #ef9a9a}
.tdet{display:none;padding:0 14px 14px;border-top:1px solid var(--bd);background:var(--sur2)}
.tdet.on{display:block}
.drow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd);font-size:13px}
.drow:last-of-type{border-bottom:none}
.drow .lb{color:var(--mu)}
.drow .vl{font-weight:700;text-align:right;max-width:60%}
.mbox{margin-top:8px;padding:10px 12px;background:#fff;border:1px solid var(--bd);border-radius:10px;font-size:12px;color:var(--mu);line-height:1.7}
.ewarn{margin:0 0 8px;padding:9px 12px;background:#fff8e1;border:1px solid #ffe082;border-radius:10px;font-size:12px;color:#e65100;font-weight:700}
.ewarn.expd{background:#fce4ec;border-color:#ef9a9a;color:#c62828}
.abtns{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.abt{flex:1;min-width:60px;padding:9px;border-radius:10px;border:1.5px solid var(--bd2);background:#fff;color:var(--tx);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.abt:hover{border-color:var(--bl);color:var(--bl);background:var(--bls)}
.abt.rd:hover{border-color:var(--rd);color:var(--rd);background:var(--rds)}
.medit{display:none;margin-top:8px}
.medit textarea{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--bd2);background:#fff;color:var(--tx);font-family:inherit;font-size:13px;resize:none;height:72px;outline:none;margin-bottom:6px}
.medit textarea:focus{border-color:var(--bl)}
.msavebtn{width:100%;padding:9px;border-radius:10px;border:none;background:var(--bl);color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}

/* 경비 */
.mfilter{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
.mfilter::-webkit-scrollbar{display:none}
.mchip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--bd2);background:var(--sur);color:var(--mu);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s}
.mchip.on{background:var(--bl);border-color:var(--bl);color:#fff}
.esum{margin:4px 16px 12px;background:var(--sur);border:1.5px solid var(--bd);border-radius:16px;padding:16px;box-shadow:var(--sh)}
.esr{display:flex}
.ei{flex:1;text-align:center}
.ei+.ei{border-left:1px solid var(--bd)}
.elbl{font-size:10px;color:var(--mu);font-weight:700;margin-bottom:4px}
.eval{font-size:18px;font-weight:800}
.eval.ic{color:var(--gr)}
.eval.ex{color:var(--rd)}
.eval.bl{color:var(--bl)}
.elit{padding:0 16px}
.eit{background:var(--sur);border:1.5px solid var(--bd);border-radius:13px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;box-shadow:var(--shs)}
.eico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.eico.ic{background:var(--grs)}
.eico.ex{background:var(--rds)}
.enm{font-size:13px;font-weight:700}
.edt{font-size:11px;color:var(--mu);margin-top:2px}
.eam{font-size:14px;font-weight:800}
.eam.ic{color:var(--gr)}
.eam.ex{color:var(--rd)}

/* 메모 */
.mc{margin:0 16px 10px;background:var(--sur);border:1.5px solid var(--bd);border-radius:14px;padding:14px;box-shadow:var(--shs)}
.mt{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.mtag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;flex-shrink:0}
.t-no{background:var(--bls);color:var(--bl)}
.t-al{background:var(--rds);color:var(--rd)}
.t-mm{background:var(--grs);color:var(--gr)}
.mcon{font-size:13px;line-height:1.7;flex:1}
.mdate{font-size:11px;color:var(--mu2);margin-top:6px}
.mdel{background:none;border:none;color:var(--mu2);cursor:pointer;font-size:18px;flex-shrink:0}

/* 현황 */
.sb{margin-bottom:8px}
.stit{font-size:11px;font-weight:700;color:var(--mu);letter-spacing:.5px;padding:14px 16px 8px;text-transform:uppercase}
.srow{display:flex;gap:8px;padding:0 16px;margin-bottom:8px}
.sc{flex:1;background:var(--sur);border:1.5px solid var(--bd);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shs)}
.sn{font-size:22px;font-weight:800;margin-bottom:4px}
.sl{font-size:11px;color:var(--mu);font-weight:700}

/* 등록 버튼 */
.regwrap{padding:8px 16px 4px}
.regbtn{width:100%;padding:15px;border:none;border-radius:14px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;transition:transform .15s}
.regbtn:hover{transform:translateY(-1px)}
.regbtn.bl{background:var(--bl);box-shadow:0 4px 16px rgba(59,110,246,.28)}
.regbtn.gr{background:var(--gr);box-shadow:0 4px 16px rgba(18,185,129,.25)}
.regbtn.pu{background:var(--pu);box-shadow:0 4px 16px rgba(139,92,246,.25)}

/* 모달 */
.ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(30,42,58,.45);z-index:500;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.ov.on{display:flex}
.mo{background:var(--sur);border-radius:24px 24px 0 0;padding:20px 20px 40px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 -4px 32px rgba(60,80,140,.12)}
.mh{width:40px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 20px}
.mo h2{font-size:16px;font-weight:800;margin-bottom:16px}
.mo label{font-size:11px;font-weight:700;color:var(--mu);display:block;margin-bottom:6px}
.mo input,.mo select,.mo textarea{width:100%;padding:11px 12px;border-radius:10px;border:1.5px solid var(--bd2);background:var(--sur2);color:var(--tx);font-family:inherit;font-size:14px;margin-bottom:14px;outline:none;transition:border-color .2s}
.mo input:focus,.mo select:focus,.mo textarea:focus{border-color:var(--bl);background:#fff}
.mo textarea{height:80px;resize:none}
.mbtns{display:flex;gap:8px;margin-top:4px}
.mbtn{flex:1;padding:13px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;border:none}
.mbtn.cc{background:var(--sur2);color:var(--mu)}
.mbtn.cf{background:var(--bl);color:#fff}

/* 달력 */
.calsec{margin-bottom:14px}
.calsec label{font-size:11px;font-weight:700;color:var(--mu);display:block;margin-bottom:8px}
.calsel{display:flex;gap:8px;margin-bottom:8px}
.calsel select{flex:1;margin-bottom:0;padding:10px 8px;font-size:14px;font-weight:700}
.caldow{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:4px}
.caldow span{font-size:11px;font-weight:700;padding:4px 0;color:var(--mu)}
.caldow span:first-child{color:var(--rd)}
.caldow span:last-child{color:var(--bl)}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cd{text-align:center;padding:7px 2px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;color:var(--tx);background:none;border:none;font-family:inherit;width:100%}
.cd:hover{background:var(--bls);color:var(--bl)}
.cd.su{color:var(--rd)}
.cd.sa{color:var(--bl)}
.cd.sel{background:var(--bl);color:#fff!important}
.cd.tod{outline:2px solid var(--bl);outline-offset:-2px}
.cd.emp{cursor:default;visibility:hidden}
.pprev{background:var(--bls);border-radius:10px;padding:10px 14px;text-align:center;font-size:13px;font-weight:700;color:var(--bl);margin-bottom:14px;display:none}
.pprev.on{display:block}

/* 빈 상태 */
.empty{text-align:center;padding:40px 20px;color:var(--mu2)}
.empty div{font-size:36px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.8}
</style>
</head>
<body>

<div class="tabbar">
  <button class="tb on" onclick="showPg('tenants')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>세입자
  </button>
  <button class="tb" onclick="showPg('expenses')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>경비
  </button>
  <button class="tb" onclick="showPg('memos')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>메모
  </button>
  <button class="tb" onclick="showPg('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>현황
  </button>
</div>

<!-- 세입자 -->
<div id="pg-tenants" class="pg on">
  <div class="ph"><h1>&#127962; 세입자 관리</h1><p id="tsum">로딩 중...</p></div>
  <div class="cbar">
    <select class="csel" id="csel" onchange="setC(this.value)"></select>
    <button class="cbtn cbtn-del" id="cdelbtn" onclick="reqDel()" style="display:none">삭제</button>
    <button class="cbtn cbtn-add" onclick="toggleAddC()">+</button>
  </div>
  <div class="cai" id="cai">
    <input type="text" id="cnew" placeholder="예: 관악구 기석빌라" maxlength="20">
    <button class="ok" onclick="addC()">추가</button>
    <button class="cancel" onclick="toggleAddC()">취소</button>
  </div>
  <div class="delbar" id="delbar">
    <p id="delmsg"></p>
    <button class="dn" onclick="cancelDel()">취소</button>
    <button class="dy" onclick="confirmDel()">삭제</button>
  </div>
  <div class="slbl" id="lbl-exit">퇴실 예정</div>
  <div id="lst-exit"></div>
  <div class="slbl" id="lbl-stay">거주 중</div>
  <div id="lst-stay"></div>
  <div class="slbl" id="lbl-pending">확인 필요</div>
  <div id="lst-pending"></div>
  <div class="regwrap"><button class="regbtn bl" onclick="openMT()">+ 세입자 등록하기</button></div>
</div>

<!-- 경비 -->
<div id="pg-expenses" class="pg">
  <div class="ph"><h1>&#128179; 경비 기록</h1><p>입출금 내역</p></div>
  <div class="mfilter" id="mfilter"></div>
  <div class="esum">
    <div class="esr">
      <div class="ei"><div class="elbl">수입</div><div class="eval ic" id="e-ic">0</div></div>
      <div class="ei"><div class="elbl">지출</div><div class="eval ex" id="e-ex">0</div></div>
      <div class="ei"><div class="elbl">잔액</div><div class="eval bl" id="e-bl">0</div></div>
    </div>
  </div>
  <div class="elit" id="elit"></div>
  <div class="regwrap"><button class="regbtn gr" onclick="openEX()">+ 경비 추가하기</button></div>
</div>

<!-- 메모 -->
<div id="pg-memos" class="pg">
  <div class="ph"><h1>&#128221; 메모 · 알림</h1><p>공지, 메모, 주의사항 관리</p></div>
  <div style="height:12px"></div>
  <div id="mlst"></div>
  <div class="regwrap"><button class="regbtn pu" onclick="openMM()">+ 메모 추가하기</button></div>
</div>

<!-- 현황 -->
<div id="pg-stats" class="pg">
  <div class="ph"><h1>&#128202; 전체 현황</h1><p>단지별 통합 요약</p></div>
  <div style="height:8px"></div>
  <div id="stcon"></div>
</div>

<!-- 세입자 모달 -->
<div class="ov" id="ov-t">
  <div class="mo">
    <div class="mh"></div>
    <h2>세입자 추가</h2>
    <label>단지</label><select id="f-cx"></select>
    <label>동/호수</label><input type="text" id="f-rm" placeholder="예: 101동 302호">
    <label>세입자 이름</label><input type="text" id="f-nm" placeholder="홍길동">
    <label>연락처</label><input type="tel" id="f-ph" placeholder="010-0000-0000">
    <label>임대 시작일</label>
    <div class="calsec">
      <div class="calsel"><select id="sy" onchange="drawCal('s')"></select><select id="sm" onchange="drawCal('s')"></select></div>
      <div class="caldow"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
      <div class="calgrid" id="cal-s"></div>
    </div>
    <label>임대 종료일</label>
    <div class="calsec">
      <div class="calsel"><select id="ey" onchange="drawCal('e')"></select><select id="em" onchange="drawCal('e')"></select></div>
      <div class="caldow"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
      <div class="calgrid" id="cal-e"></div>
    </div>
    <div class="pprev" id="pprev"></div>
    <label>월세 / 보증금</label><input type="text" id="f-rn" placeholder="보증금 1000 / 월세 50">
    <label>상태</label>
    <select id="f-st">
      <option value="stay">거주 중</option>
      <option value="exit">퇴실 예정</option>
      <option value="pending">확인 필요</option>
    </select>
    <label>메모</label><textarea id="f-mm" placeholder="특이사항 등"></textarea>
    <div class="mbtns">
      <button class="mbtn cc" onclick="closeOv('ov-t')">취소</button>
      <button class="mbtn cf" onclick="saveT()">저장</button>
    </div>
  </div>
</div>

<!-- 경비 모달 -->
<div class="ov" id="ov-e">
  <div class="mo">
    <div class="mh"></div>
    <h2>경비 입력</h2>
    <label>구분</label>
    <select id="ef-tp">
      <option value="income">수입 (월세, 보증금 등)</option>
      <option value="expense">지출 (수리비, 관리비 등)</option>
    </select>
    <label>단지</label><select id="ef-cx"></select>
    <label>내용</label><input type="text" id="ef-nm" placeholder="예: 1월 월세, 보일러 수리">
    <label>금액 (만원)</label><input type="number" id="ef-am" placeholder="50">
    <label>날짜</label><input type="date" id="ef-dt">
    <div class="mbtns">
      <button class="mbtn cc" onclick="closeOv('ov-e')">취소</button>
      <button class="mbtn cf" onclick="saveEX()">저장</button>
    </div>
  </div>
</div>

<!-- 메모 모달 -->
<div class="ov" id="ov-m">
  <div class="mo">
    <div class="mh"></div>
    <h2>메모 추가</h2>
    <label>유형</label>
    <select id="mf-tp">
      <option value="notice">공지</option>
      <option value="alert">주의</option>
      <option value="memo">메모</option>
    </select>
    <label>내용</label><textarea id="mf-ct" placeholder="메모 내용을 입력하세요"></textarea>
    <div class="mbtns">
      <button class="mbtn cc" onclick="closeOv('ov-m')">취소</button>
      <button class="mbtn cf" onclick="saveMM()">저장</button>
    </div>
  </div>
</div>

<script>
var D = { cx:[], tn:[], ex:[], mm:[] };
var curC = '전체', curM = '', pendDel = null;
var calS = {s:null, e:null};
var curPg = 'tenants';
var loaded = false;

// Firebase 로드
db.ref('data').once('value').then(function(snap) {
  var d = snap.val();
  if (d && d.cx && d.cx.length) {
    D.cx = d.cx || [];
    D.tn = d.tn || [];
    D.ex = d.ex || [];
    D.mm = d.mm || [];
    curC = D.cx[0];
  } else {
    D = { cx:[], tn:[], ex:[], mm:[] };
    curC = '전체';
  }
  loaded = true;
  renderT();
}).catch(function() {
  loaded = true;
  renderT();
});

function saveDB() {
  db.ref('data').set({ cx:D.cx, tn:D.tn, ex:D.ex, mm:D.mm });
}

// 페이지
function showPg(p) {
  curPg = p;
  document.querySelectorAll('.pg').forEach(function(el){ el.classList.remove('on'); });
  document.querySelectorAll('.tb').forEach(function(el){ el.classList.remove('on'); });
  document.getElementById('pg-'+p).classList.add('on');
  var idx = ['tenants','expenses','memos','stats'].indexOf(p);
  document.querySelectorAll('.tb')[idx].classList.add('on');
  if (p==='tenants')  renderT();
  if (p==='expenses') renderEX();
  if (p==='memos')    renderMM();
  if (p==='stats')    renderST();
}

function openOv(id)  { document.getElementById(id).classList.add('on'); }
function closeOv(id) { document.getElementById(id).classList.remove('on'); }

// 단지
function renderCsel() {
  var s = document.getElementById('csel');
  var html = '<option value="전체">전체 단지</option>';
  D.cx.forEach(function(c){ html += '<option value="'+c+'">'+ c +'</option>'; });
  s.innerHTML = html;
  s.value = curC;
  var db2 = document.getElementById('cdelbtn');
  db2.style.display = (curC !== '전체' && D.cx.indexOf(curC) >= 0) ? '' : 'none';
}

function setC(v) {
  curC = v;
  renderCsel();
  renderT();
}

function toggleAddC() {
  var el = document.getElementById('cai');
  el.classList.toggle('on');
  if (el.classList.contains('on')) { document.getElementById('cnew').value=''; document.getElementById('cnew').focus(); }
}

function addC() {
  var name = document.getElementById('cnew').value.trim();
  if (!name) { alert('단지 이름을 입력해 주세요.'); return; }
  if (D.cx.indexOf(name) >= 0) { alert('이미 있는 단지입니다.'); return; }
  D.cx.push(name);
  saveDB();
  curC = name;
  toggleAddC();
  renderCsel();
  renderT();
}

function reqDel() {
  if (curC === '전체') return;
  pendDel = curC;
  var cnt = D.tn.filter(function(t){ return t.complex === curC; }).length;
  document.getElementById('delmsg').textContent = '"'+curC+'" 단지를 삭제할까요?' + (cnt > 0 ? ' (세입자 '+cnt+'명도 함께 삭제)' : '');
  document.getElementById('delbar').classList.add('on');
}
function confirmDel() {
  D.cx = D.cx.filter(function(c){ return c !== pendDel; });
  D.tn = D.tn.filter(function(t){ return t.complex !== pendDel; });
  saveDB();
  pendDel = null;
  document.getElementById('delbar').classList.remove('on');
  curC = D.cx.length ? D.cx[0] : '전체';
  renderCsel();
  renderT();
}
function cancelDel() { pendDel=null; document.getElementById('delbar').classList.remove('on'); }

// 만료 계산
function getExp(period) {
  if (!period) return null;
  var m = period.match(/~\s*([\d.]+)\s*$/);
  if (!m) return null;
  var pts = m[1].trim().split('.');
  if (pts.length < 2) return null;
  var exp = new Date(parseInt(pts[0]), parseInt(pts[1])-1, pts[2]?parseInt(pts[2]):1);
  var today = new Date(); today.setHours(0,0,0,0);
  return Math.ceil((exp-today)/86400000);
}

// 세입자
function renderT() {
  renderCsel();
  var all = curC==='전체' ? D.tn : D.tn.filter(function(t){ return t.complex===curC; });
  var exits = all.filter(function(t){ return t.status==='exit'; });
  var stays = all.filter(function(t){ return t.status==='stay'; });
  var pends = all.filter(function(t){ return t.status==='pending'; });

  document.getElementById('lbl-exit').style.display = exits.length ? '' : 'none';
  document.getElementById('lbl-stay').style.display = (stays.length || !all.length) ? '' : 'none';
  document.getElementById('lbl-pending').style.display = pends.length ? '' : 'none';

  document.getElementById('lst-exit').innerHTML    = exits.map(tcard).join('');
  document.getElementById('lst-pending').innerHTML = pends.map(tcard).join('');
  document.getElementById('lst-stay').innerHTML    = stays.length ? stays.map(tcard).join('') :
    (!all.length ? '<div class="empty"><div>&#127968;</div><p>세입자가 없습니다<br>아래 버튼으로 추가해 보세요</p></div>' : '');

  document.getElementById('tsum').textContent = '총 '+all.length+'세대 · 퇴실예정 '+exits.length+' · 거주중 '+stays.length;
}

function tcard(t) {
  var diff = getExp(t.period);
  var isExpd = diff !== null && diff <= 0;
  var isWarn = diff !== null && diff > 0 && diff <= 14;
  var badge = isExpd  ? '<span class="tbadge b-expd">계약만료</span>' :
              isWarn  ? '<span class="tbadge b-exp">만료 D-'+diff+'</span>' :
              t.status==='exit'    ? '<span class="tbadge b-exit">퇴실예정</span>' :
              t.status==='stay'    ? '<span class="tbadge b-stay">거주중</span>' :
                                     '<span class="tbadge b-pending">확인필요</span>';
  var icon = t.status==='exit' ? '&#128682;' : t.status==='pending' ? '&#9888;&#65039;' : '&#127968;';
  var warn = isExpd ? '<div class="ewarn expd">&#128308; 계약이 만료되었습니다 - 갱신 또는 퇴실 확인 필요</div>'
           : isWarn ? '<div class="ewarn">&#9200; 계약 만료 '+diff+'일 전 - 갱신 여부를 확인하세요</div>' : '';
  var memo = t.memo ? '<div class="mbox">&#128172; '+t.memo+'</div>' : '';
  return '<div class="tc '+t.status+'">' +
    '<div class="sbar"></div>' +
    '<div class="thead" onclick="togDet('+t.id+')">' +
      '<div class="tico">'+icon+'</div>' +
      '<div class="tinf"><div class="troom">'+t.complex+' · '+t.room+'</div><div class="tname">'+t.name+' · '+t.phone+'</div></div>' +
      badge +
    '</div>' +
    '<div class="tdet" id="td-'+t.id+'">' +
      warn +
      '<div class="drow"><span class="lb">임대기간</span><span class="vl">'+t.period+'</span></div>' +
      '<div class="drow"><span class="lb">임대조건</span><span class="vl">'+t.rent+'</span></div>' +
      memo +
      '<div class="abtns">' +
        '<button class="abt" onclick="callT(\''+t.phone+'\')">&#128222; 전화</button>' +
        '<button class="abt" onclick="cycSt('+t.id+')">상태변경</button>' +
        '<button class="abt" onclick="togME('+t.id+')">&#128172; 메모</button>' +
        '<button class="abt rd" onclick="delT('+t.id+')">삭제</button>' +
      '</div>' +
      '<div class="medit" id="me-'+t.id+'">' +
        '<textarea id="mta-'+t.id+'" placeholder="메모를 입력하세요">'+( t.memo||'' )+'</textarea>' +
        '<button class="msavebtn" onclick="saveME('+t.id+')">저장</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function togDet(id) { document.getElementById('td-'+id).classList.toggle('on'); }
function callT(ph)  { window.location.href='tel:'+ph; }
function togME(id)  {
  var el = document.getElementById('me-'+id);
  el.style.display = el.style.display==='block' ? 'none' : 'block';
}
function saveME(id) {
  var t = D.tn.find(function(x){ return x.id===id; });
  t.memo = document.getElementById('mta-'+id).value.trim();
  saveDB();
  document.getElementById('me-'+id).style.display='none';
  renderT();
  setTimeout(function(){ var d=document.getElementById('td-'+id); if(d) d.classList.add('on'); }, 50);
}
function cycSt(id) {
  var t = D.tn.find(function(x){ return x.id===id; });
  var l = ['stay','exit','pending'];
  t.status = l[(l.indexOf(t.status)+1)%3];
  saveDB(); renderT();
}
function delT(id) {
  if (!confirm('세입자를 삭제할까요?')) return;
  D.tn = D.tn.filter(function(t){ return t.id!==id; });
  saveDB(); renderT();
}

// 달력
function initCal() {
  calS = {s:null, e:null};
  var now = new Date(), y=now.getFullYear(), m=now.getMonth()+1;
  ['s','e'].forEach(function(tp) {
    var ys=document.getElementById(tp+'y'), ms=document.getElementById(tp+'m');
    ys.innerHTML=''; for(var i=y-3;i<=y+10;i++) ys.innerHTML+='<option value="'+i+'"'+(i===y?' selected':'')+'>'+i+'년</option>';
    ms.innerHTML=''; for(var i=1;i<=12;i++) ms.innerHTML+='<option value="'+i+'"'+(i===m?' selected':'')+'>'+i+'월</option>';
    drawCal(tp);
  });
  document.getElementById('pprev').classList.remove('on');
}
function pad(n){ return n<10?'0'+n:''+n; }
function drawCal(tp) {
  var y=parseInt(document.getElementById(tp+'y').value), m=parseInt(document.getElementById(tp+'m').value);
  var grid=document.getElementById('cal-'+tp), first=new Date(y,m-1,1).getDay(), days=new Date(y,m,0).getDate();
  var today=new Date(); today.setHours(0,0,0,0);
  var sel=calS[tp], html='';
  for(var i=0;i<first;i++) html+='<button class="cd emp" disabled></button>';
  for(var d=1;d<=days;d++){
    var dt=new Date(y,m-1,d), dow=dt.getDay(), ds=y+'.'+pad(m)+'.'+pad(d);
    var cls='cd'+(dow===0?' su':'')+(dow===6?' sa':'')+(ds===sel?' sel':'')+(dt.getTime()===today.getTime()?' tod':'');
    html+='<button class="'+cls+'" onclick="pickD(\''+tp+'\',\''+ds+'\')">'+d+'</button>';
  }
  grid.innerHTML=html;
}
function pickD(tp,ds){
  calS[tp]=ds; drawCal(tp);
  var pv=document.getElementById('pprev');
  if(calS.s&&calS.e){ pv.textContent=calS.s+' ~ '+calS.e; pv.classList.add('on'); }
  else if(calS.s){ pv.textContent='시작일: '+calS.s+' | 종료일을 선택하세요'; pv.classList.add('on'); }
  else pv.classList.remove('on');
}

function openMT() {
  var opts=D.cx.map(function(c){ return '<option value="'+c+'">'+c+'</option>'; }).join('');
  document.getElementById('f-cx').innerHTML=opts;
  if(curC!=='전체'&&D.cx.indexOf(curC)>=0) document.getElementById('f-cx').value=curC;
  ['f-rm','f-nm','f-ph','f-rn','f-mm'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('f-st').value='stay';
  initCal();
  openOv('ov-t');
}
function saveT() {
  var period=(calS.s&&calS.e)?calS.s+' ~ '+calS.e:'';
  var t={id:Date.now(),complex:document.getElementById('f-cx').value,room:document.getElementById('f-rm').value,name:document.getElementById('f-nm').value,phone:document.getElementById('f-ph').value,period:period,rent:document.getElementById('f-rn').value,status:document.getElementById('f-st').value,memo:document.getElementById('f-mm').value};
  if(!t.room||!t.name){ alert('동/호수와 이름을 입력해 주세요.'); return; }
  D.tn.push(t); saveDB(); closeOv('ov-t');
  curC=t.complex; renderCsel(); renderT();
}

// 경비
function renderEX() {
  var months=[];
  D.ex.forEach(function(e){ var m=e.date.slice(0,7); if(months.indexOf(m)<0) months.push(m); });
  months.sort().reverse();
  if(!curM||months.indexOf(curM)<0) curM=months[0]||new Date().toISOString().slice(0,7);
  document.getElementById('mfilter').innerHTML=months.map(function(m){
    return '<button class="mchip'+(m===curM?' on':'')+'" onclick="setM(\''+m+'\')">'+m.replace('-','년 ')+'월</button>';
  }).join('');
  var fl=D.ex.filter(function(e){ return e.date.startsWith(curM); });
  var ic=0,ex=0; fl.forEach(function(e){ if(e.type==='income') ic+=e.amount; else ex+=e.amount; });
  var bl=ic-ex;
  document.getElementById('e-ic').textContent=ic+'만';
  document.getElementById('e-ex').textContent=ex+'만';
  document.getElementById('e-bl').textContent=(bl>=0?'+':'')+bl+'만';
  if(!fl.length){ document.getElementById('elit').innerHTML='<div class="empty"><div>&#128184;</div><p>이 달의 내역이 없습니다</p></div>'; return; }
  fl.sort(function(a,b){ return b.date.localeCompare(a.date); });
  document.getElementById('elit').innerHTML=fl.map(function(e){
    var ic2=e.type==='income'; var sign=ic2?'+':'-';
    return '<div class="eit"><div class="eico '+(ic2?'ic':'ex')+'">'+(ic2?'&#128176;':'&#128295;')+'</div><div style="flex:1"><div class="enm">['+e.complex+'] '+e.name+'</div><div class="edt">'+e.date+'</div></div><div class="eam '+(ic2?'ic':'ex')+'">'+sign+e.amount+'만</div><button style="background:none;border:none;color:var(--mu2);cursor:pointer;margin-left:4px;font-size:18px;padding:4px" onclick="delEX('+e.id+')">x</button></div>';
  }).join('');
}
function setM(m){ curM=m; renderEX(); }
function openEX(){
  var opts=D.cx.map(function(c){ return '<option value="'+c+'">'+c+'</option>'; }).join('');
  document.getElementById('ef-cx').innerHTML=opts+'<option value="공통">공통</option>';
  document.getElementById('ef-dt').value=new Date().toISOString().slice(0,10);
  document.getElementById('ef-nm').value=''; document.getElementById('ef-am').value='';
  openOv('ov-e');
}
function saveEX(){
  var e={id:Date.now(),type:document.getElementById('ef-tp').value,complex:document.getElementById('ef-cx').value,name:document.getElementById('ef-nm').value,amount:parseInt(document.getElementById('ef-am').value)||0,date:document.getElementById('ef-dt').value};
  if(!e.name||!e.amount){ alert('내용과 금액을 입력해 주세요.'); return; }
  D.ex.push(e); saveDB(); closeOv('ov-e'); curM=e.date.slice(0,7); renderEX();
}
function delEX(id){ if(!confirm('삭제할까요?')) return; D.ex=D.ex.filter(function(e){ return e.id!==id; }); saveDB(); renderEX(); }

// 메모
function renderMM(){
  if(!D.mm.length){ document.getElementById('mlst').innerHTML='<div class="empty"><div>&#128221;</div><p>메모가 없습니다</p></div>'; return; }
  var tm={notice:'t-no',alert:'t-al',memo:'t-mm'}, lm={notice:'공지',alert:'주의',memo:'메모'};
  document.getElementById('mlst').innerHTML=D.mm.slice().reverse().map(function(m){
    return '<div class="mc"><div class="mt"><div class="mcon">'+m.content+'</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0"><span class="mtag '+tm[m.type]+'">'+lm[m.type]+'</span><button class="mdel" onclick="delMM('+m.id+')">x</button></div></div><div class="mdate">'+m.date+'</div></div>';
  }).join('');
}
function openMM(){ document.getElementById('mf-ct').value=''; openOv('ov-m'); }
function saveMM(){
  var ct=document.getElementById('mf-ct').value.trim();
  if(!ct){ alert('내용을 입력해 주세요.'); return; }
  D.mm.push({id:Date.now(),type:document.getElementById('mf-tp').value,content:ct,date:new Date().toLocaleDateString('ko-KR')});
  saveDB(); closeOv('ov-m'); renderMM();
}
function delMM(id){ if(!confirm('삭제할까요?')) return; D.mm=D.mm.filter(function(m){ return m.id!==id; }); saveDB(); renderMM(); }

// 현황
function renderST(){
  if(!D.cx.length){ document.getElementById('stcon').innerHTML='<div class="empty"><div>&#128202;</div><p>단지가 없습니다</p></div>'; return; }
  document.getElementById('stcon').innerHTML=D.cx.map(function(c){
    var ct=D.tn.filter(function(t){ return t.complex===c; });
    var ex=ct.filter(function(t){ return t.status==='exit'; });
    var st=ct.filter(function(t){ return t.status==='stay'; }).length;
    var pe=ct.filter(function(t){ return t.status==='pending'; }).length;
    return '<div class="sb"><div class="stit">&#127962; '+c+'</div><div class="srow"><div class="sc"><div class="sn" style="color:var(--gr)">'+st+'</div><div class="sl">거주 중</div></div><div class="sc"><div class="sn" style="color:var(--rd)">'+ex.length+'</div><div class="sl">퇴실 예정</div></div><div class="sc"><div class="sn" style="color:var(--am)">'+pe+'</div><div class="sl">확인 필요</div></div></div>'+
      ex.map(function(t){ return '<div style="margin:0 16px 6px"><div class="eit"><div class="eico ex">&#128682;</div><div style="flex:1"><div class="enm">'+t.room+' · '+t.name+'</div><div class="edt">'+t.period+' · '+t.phone+'</div></div></div></div>'; }).join('') +
    '</div>';
  }).join('');
}

// 오버레이 닫기
document.querySelectorAll('.ov').forEach(function(el){
  el.addEventListener('click', function(e){ if(e.target===this) this.classList.remove('on'); });
});
document.getElementById('cnew').addEventListener('keydown', function(e){ if(e.key==='Enter') addC(); });
</script>
</body>
</html>
